spring:
  application:
    name: dbms-assignment

  datasource:
    url: jdbc:postgresql://localhost:5433/main_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    web:
      pageable:
        max-page-size: 10000

logging:
  file:
    name: logs/learning.log

management:
  endpoints:
    web:
      exposure:
        include: "*"

app:
  jwt:
    # 256-bit Base64-encoded secret
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000 # 24 hours
  payment:
    momo:
      partner-code: ${MOMO_PARTNER_CODE:}
      access-key: ${MOMO_ACCESS_KEY:}
      secret-key: ${MOMO_SECRET_KEY:}
      endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
      return-url: ${MOMO_RETURN_URL:http://localhost:5173/payment/momo-return}
      ipn-url: ${MOMO_IPN_URL:http://localhost:8080/api/payments/momo/ipn}
      request-type: ${MOMO_REQUEST_TYPE:captureWallet}
      lang: ${MOMO_LANG:vi}